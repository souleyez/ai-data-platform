name: ai-data-platform

services:
  api:
    build:
      context: ..
      dockerfile: deploy/docker/api.Dockerfile
    env_file:
      - ../apps/api/.env
    environment:
      PORT: 3100
      HOST: 0.0.0.0
      AI_DATA_PLATFORM_STORAGE_ROOT: /data/storage
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL:-http://host.docker.internal:18789}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${API_PORT:-3100}:3100"
    volumes:
      - ai_data_platform_storage:/data/storage
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: deploy/docker/web.Dockerfile
    env_file:
      - ../apps/web/.env
    environment:
      BACKEND_API_BASE_URL: http://api:3100
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3002}:3000"
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: deploy/docker/worker.Dockerfile
    env_file:
      - ../apps/worker/.env
    environment:
      API_BASE_URL: http://api:3100
    depends_on:
      - api
    restart: unless-stopped

volumes:
  ai_data_platform_storage:
