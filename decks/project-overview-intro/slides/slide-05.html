<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>主流程</title>
  <link rel="stylesheet" href="./assets/theme.css" />
</head>
<body>
  <main class="slide">
    <div class="eyebrow">Core Workflow</div>
    <h1 class="title">从资料进入到结果输出的主流程</h1>
    <p class="subtitle">系统采用统一处理链，把不同来源资料转换成同一种可消费的数据资产。</p>

    <section class="flow">
      <article class="flow-step">
        <div class="num">STEP 01</div>
        <h3>资料进入</h3>
        <p>本机扫描、文件上传或数据源采集，把资料复制到平台托管区。</p>
      </article>
      <article class="flow-step">
        <div class="num">STEP 02</div>
        <h3>快速解析</h3>
        <p>形成摘要、分类建议和初步结构化信息，为后续索引做准备。</p>
      </article>
      <article class="flow-step">
        <div class="num">STEP 03</div>
        <h3>自动分组</h3>
        <p>命中已有库则直接入库，无法判断时进入未分组。</p>
      </article>
      <article class="flow-step">
        <div class="num">STEP 04</div>
        <h3>增强处理</h3>
        <p>异步完成深解析、索引、向量化与记忆同步，形成稳定知识底座。</p>
      </article>
      <article class="flow-step">
        <div class="num">STEP 05</div>
        <h3>结果沉淀</h3>
        <p>按需生成问答、表格、静态页和报表，并沉淀到报表中心。</p>
      </article>
    </section>

    <div class="footer">
      <span>AI 知识数据平台综合介绍</span>
      <span>05</span>
    </div>
  </main>
</body>
</html>
