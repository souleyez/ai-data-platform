<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 知识数据平台综合介绍</title>
  <link rel="stylesheet" href="./assets/theme.css" />
</head>
<body>
  <main class="slide">
    <div class="eyebrow">Project Overview</div>
    <h1 class="title">AI 知识数据平台<br />综合介绍</h1>
    <p class="subtitle">从本机文档、上传文件、业务数据源到知识问答与可视化输出的一体化工作台。</p>

    <section class="split-note">
      <div class="hero-card panel">
        <div>
          <div class="pill">综合项目介绍 · 正式汇报版</div>
          <p class="big">让资料进入系统后，持续形成可回答、可输出、可复用的知识资产。</p>
        </div>
        <p>面向业务负责人、合作方、客户侧产品与运营团队</p>
      </div>
      <div class="diagram panel">
        <div class="diagram-node" style="left:24px;top:44px;"><strong>本机文档</strong>扫描、上传、发现</div>
        <div class="diagram-node" style="left:218px;top:20px;"><strong>知识处理</strong>解析、结构化、分组</div>
        <div class="diagram-node" style="left:408px;top:44px;"><strong>长期记忆</strong>库目录、文档卡片、变化记录</div>
        <div class="diagram-node" style="left:384px;top:202px;"><strong>结果输出</strong>问答、表格、静态页</div>
        <div class="diagram-node" style="left:180px;top:248px;"><strong>报表中心</strong>保存、修订、复用</div>
        <div class="diagram-node" style="left:22px;top:214px;"><strong>业务数据源</strong>网页、表格、业务接口</div>
        <div class="diagram-line" style="left:150px;top:98px;width:92px;transform:rotate(-16deg);"></div>
        <div class="diagram-line" style="left:348px;top:92px;width:82px;transform:rotate(18deg);"></div>
        <div class="diagram-line" style="left:458px;top:164px;width:94px;transform:rotate(56deg);"></div>
        <div class="diagram-line" style="left:282px;top:268px;width:120px;transform:rotate(-16deg);"></div>
        <div class="diagram-line" style="left:148px;top:268px;width:76px;transform:rotate(14deg);"></div>
      </div>
    </section>

    <div class="footer">
      <span>AI 知识数据平台综合介绍</span>
      <span>01</span>
    </div>
  </main>
</body>
</html>
